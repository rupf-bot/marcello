<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Preview – Hallo</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Caveat:wght@600&family=Great+Vibes&family=Sacramento&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body { background: #737FDF; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; gap: 2.5rem; padding: 3rem 2rem; box-sizing: border-box; }
    .item { text-align: center; }
    .label { font-family: sans-serif; font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: .4rem; }
    .word { color: #fff; font-size: 4rem; line-height: 1; }
    .dancing  { font-family: 'Dancing Script', cursive; }
    .caveat   { font-family: 'Caveat', cursive; }
    .greatvibes { font-family: 'Great Vibes', cursive; }
    .sacramento { font-family: 'Sacramento', cursive; }
    .pacifico { font-family: 'Pacifico', cursive; }
  </style>
</head>
<body>
  <div class="item"><div class="label">Dancing Script</div><div class="word dancing">Hallo</div></div>
  <div class="item"><div class="label">Caveat</div><div class="word caveat">Hallo</div></div>
  <div class="item"><div class="label">Great Vibes</div><div class="word greatvibes">Hallo</div></div>
  <div class="item"><div class="label">Sacramento</div><div class="word sacramento">Hallo</div></div>
  <div class="item"><div class="label">Pacifico</div><div class="word pacifico">Hallo</div></div>
</body>
</html>
